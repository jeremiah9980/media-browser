name: Deploy
   on:
     push:
       branches: [main]
   jobs:
     deploy:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v3
         - name: Inject API key
           run: sed -i 's/%%GOOGLE_API_KEY%%/${{ secrets.GOOGLE_API_KEY }}/g' index.html
         - uses: peaceiris/actions-gh-pages@v3
           with:
             github_token: ${{ secrets.GITHUB_TOKEN }}
             publish_dir: ./
